# Production profile — Supabase PostgreSQL
spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
    # Supabase requires SSL
    properties:
      sslmode: require

  jpa:
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: WARN
    com.securevault: INFO
