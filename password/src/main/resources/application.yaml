spring:
  application:
    name: securevault

  # Default datasource — overridden by profile-specific configs
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/securevault}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

securevault:
  jwt:
    secret: ${JWT_SECRET:SecureVaultDefaultJwtSecretKeyMustBeAtLeast256Bits!}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,chrome-extension://*}

logging:
  level:
    root: INFO
    com.securevault: INFO
    org.springframework.security: WARN
