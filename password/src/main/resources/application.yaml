spring:
  application:
    name: securevault

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/securevault}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

securevault:
  jwt:
    secret: ${JWT_SECRET:SecureVaultDefaultJwtSecretKeyMustBeAtLeast256Bits!}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours
