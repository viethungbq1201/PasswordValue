<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <!-- Login View -->
        <div id="login-view">
            <div class="header">
                <div class="logo">🛡️</div>
                <h1>SecureVault</h1>
                <p class="subtitle">Zero-knowledge password manager</p>
            </div>

            <div id="login-error" class="error" style="display:none;"></div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email" autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" id="master-password" placeholder="Master Password"
                    autocomplete="current-password">
            </div>
            <button id="login-btn" class="btn-primary">Log In</button>
        </div>

        <!-- Vault View -->
        <div id="vault-view" style="display:none;">
            <div class="vault-header">
                <h2>My Vault</h2>
                <div class="vault-actions">
                    <button id="show-gen-btn" class="btn-icon" title="Generator">🔐</button>
                    <button id="sync-btn" class="btn-icon" title="Sync">🔄</button>
                    <button id="logout-btn" class="btn-icon" title="Logout">↗️</button>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="search-input" placeholder="Search vault...">
            </div>

            <div id="vault-list" class="vault-list">
                <div class="empty-state">
                    <p>No items in vault</p>
                </div>
            </div>

            <div class="vault-footer">
                <span id="item-count">0 items</span>
            </div>
        </div>

        <!-- Generator View -->
        <div id="generator-view" style="display:none;">
            <div class="vault-header">
                <h2>Generator</h2>
                <div class="vault-actions">
                    <button id="hide-gen-btn" class="btn-icon" title="Back">⬅️</button>
                </div>
            </div>

            <div class="form-group" style="margin-top: 12px; margin-bottom: 12px;">
                <input type="text" id="gen-password-input" readonly
                    style="font-family: monospace; text-align: center; font-size: 16px;">
            </div>

            <div style="display: flex; gap: 4px; height: 6px; margin-bottom: 4px;" id="gen-strength-bar">
                <div id="str-0" style="flex: 1; border-radius: 4px; background: var(--border);"></div>
                <div id="str-1" style="flex: 1; border-radius: 4px; background: var(--border);"></div>
                <div id="str-2" style="flex: 1; border-radius: 4px; background: var(--border);"></div>
                <div id="str-3" style="flex: 1; border-radius: 4px; background: var(--border);"></div>
            </div>
            <div id="gen-strength-text"
                style="text-align: right; font-size: 10px; font-weight: bold; color: var(--text-secondary); margin-bottom: 16px;">
                WEAK</div>

            <div class="form-group" style="margin-bottom: 16px;">
                <label
                    style="font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between;">
                    <span>Length</span>
                    <span id="gen-length-val">20</span>
                </label>
                <input type="range" id="gen-length" min="4" max="40" value="20" style="width: 100%;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px;">
                <label style="font-size: 12px; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="gen-upper" checked> A-Z
                </label>
                <label style="font-size: 12px; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="gen-lower" checked> a-z
                </label>
                <label style="font-size: 12px; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="gen-num" checked> 0-9
                </label>
                <label style="font-size: 12px; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" id="gen-sym" checked> !@#$
                </label>
            </div>

            <button id="gen-regen-btn" class="btn-primary"
                style="margin-bottom: 8px; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border);">Regenerate</button>
            <button id="gen-copy-btn" class="btn-primary">Copy Password</button>
        </div>

        <!-- Loading -->
        <div id="loading" style="display:none;">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="lib/zxcvbn.js"></script>
    <script src="popup.js"></script>
</body>

</html>
